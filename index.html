<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡廳品牌建置與營運輔導企劃</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- PptxGenJS -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs/dist/pptxgen.bundle.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="authOverlay" class="auth-overlay" aria-hidden="true">
        <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
            <div class="auth-title" id="authTitle">Password required</div>
            <div class="auth-subtitle">Enter password to continue</div>
            <form id="authForm" class="auth-form">
                <input id="authPassword" class="auth-input" type="password" autocomplete="current-password"
                    placeholder="Password" />
                <button id="authSubmit" class="auth-btn" type="submit">Unlock</button>
            </form>
            <div id="authError" class="auth-error" style="display:none;">Incorrect password</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-pdf"><i class="fas fa-file-pdf"></i> 匯出 PDF</button>
        <button style="display: none;" class="btn" id="btn-pptx"><i class="fas fa-file-powerpoint"></i> 匯出 PPTX</button>
        <button style="display: none;" class="btn" id="btn-export-json"><i class="fas fa-download"></i> 儲存/下載
            JSON</button>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>專案時程表</h2>
            </div>
            <div class="timeline" id="timelineNav">
                <!-- Autogenerated List -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="slide-container" id="slideContainer">
                <!-- Slides will be dynamically injected here -->
            </div>
        </main>
    </div>

    <div id="toast">訊息</div>

    <!-- Image Modal -->
    <div id="imageModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <span class="modal-nav prev-modal" onclick="navigateModal(-1)">&#10094;</span>
        <span class="modal-nav next-modal" onclick="navigateModal(1)">&#10095;</span>
        <img id="modalImage" src="" alt="Viewed Image">
    </div>

    <script>
        (function initPasswordGate() {
            const AUTH_KEY = 'coffee_auth_unlocked';
            const PASSWORD = 'kirk';
            const overlay = document.getElementById('authOverlay');
            const form = document.getElementById('authForm');
            const input = document.getElementById('authPassword');
            const error = document.getElementById('authError');

            function lock() {
                document.body.classList.add('locked');
                overlay.style.display = 'flex';
                overlay.setAttribute('aria-hidden', 'false');
                if (input) input.value = '';
                if (error) error.style.display = 'none';
                setTimeout(() => input && input.focus(), 0);
            }

            function unlock() {
                sessionStorage.setItem(AUTH_KEY, '1');
                document.body.classList.remove('locked');
                overlay.style.display = 'none';
                overlay.setAttribute('aria-hidden', 'true');
            }

            const unlocked = sessionStorage.getItem(AUTH_KEY) === '1';
            if (!unlocked) lock();
            else unlock();

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const val = (input.value || '').trim();
                if (val === PASSWORD) {
                    unlock();
                } else {
                    if (error) error.style.display = 'block';
                    if (input) input.select();
                }
            });
        })();

        // Removed hardcoded data array in favor of data.json
        const fallbackData = [];

        let presentationData = [];

        // State
        let slides = []; // NodeList updated after render

        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                presentationData = await response.json();
            } catch (error) {
                console.warn('Could not load data.json (likely due to opening file directly in browser). Falling back to default data.', error);
                presentationData = fallbackData;
            }
            renderSlides();
            initTimeline();
            initScrollSpy();
            // Automatically make editable elements contenteditable
            document.querySelectorAll('.editable').forEach(el => {
                el.setAttribute('contenteditable', 'true');
            });
        }

        function renderSlides() {
            const container = document.getElementById('slideContainer');
            container.innerHTML = ''; // Clear container

            presentationData.forEach((data, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${data.type === 'cover' ? 'cover-slide' : ''}`;
                if (index === 0) slideDiv.classList.add('active-slide');
                slideDiv.id = `slide-${data.id}`;
                slideDiv.setAttribute('data-time', data.time);
                slideDiv.setAttribute('data-type', data.type);

                let innerHTML = '';

                if (data.type === 'cover') {
                    innerHTML = `
                        <h1 class="">${data.title}</h1>
                        <div class="desc-text">${data.desc}</div>
                    `;
                } else if (data.type === 'summary') {
                    innerHTML = `
                        <h2 class="">${data.title}</h2>
                        <div class="slide-meta">
                            <span class="" style="font-size: 2rem;">${data.amount}</span>
                        </div>
                        <div class="desc-text" style="font-size: 1.5rem; text-align: left;">
                            ${data.desc}
                        </div>
                    `;
                } else {
                    let subSectionsHTML = '';
                    if (data.subSections && data.subSections.length > 0) {
                        subSectionsHTML = `
                            <ul style="margin-top: 15px; padding-left: 20px; font-size: 1.1rem; color: #555; list-style-type: disc;">
                                ${data.subSections.map(sub => `<li style="margin-bottom: 5px;">${sub}</li>`).join('')}
                            </ul>
                        `;
                    }

                    let galleryHTML = '';
                    if (data.gallery && data.gallery.length > 0) {
                        galleryHTML = `
                            <div class="slide-gallery">
                                ${data.gallery.map((src, i) => `<img src="${src}" alt="Gallery Image" onclick='openModal(${i}, ${JSON.stringify(data.gallery)})'>`).join('')}
                            </div>
                        `;
                    }

                    const timeHtml = data.isSubSection ? '' : `<span class=""><i class="far fa-clock"></i> <span class="">${data.time}</span></span>`;
                    innerHTML = `
                        <h2 class="">${data.title}</h2>
                        <div class="slide-meta">
                            ${timeHtml}
                            <span class="">${data.amount}</span>
                        </div>
                        <div class="desc-text">${data.desc}</div>
                        ${subSectionsHTML}
                        ${galleryHTML}
                    `;
                }

                slideDiv.innerHTML = innerHTML;
                container.appendChild(slideDiv);
            });

            // Update DOM reference
            slides = document.querySelectorAll('.slide');

            // Re-bind contenteditable blur events
            document.querySelectorAll('.editable').forEach(el => {
                el.addEventListener('blur', () => {
                    initTimeline();
                });
            });
        }

        // Initialize timeline sidebar
        function initTimeline() {
            const timeline = document.getElementById('timelineNav');
            timeline.innerHTML = '';

            slides.forEach((slide, idx) => {
                if (idx === 0) return; // Skip cover for timeline

                const isSub = presentationData[idx]?.isSubSection || false;

                let timeStr = slide.getAttribute('data-time') || '';
                let timeNode = slide.querySelector('.time-text');
                if (timeNode) {
                    timeStr = timeNode.innerText; // Sync if edited
                }
                const titleNode = slide.querySelector('h1, h2');
                const titleStr = titleNode ? titleNode.innerText : presentationData[idx]?.title || "";

                const item = document.createElement('div');
                item.className = 'timeline-item' + (isSub ? ' sub-section-item' : '');
                item.onclick = () => scrollToSlide(idx);

                let timeHtml = isSub ? '' : `<div class="timeline-time">${timeStr}</div>`;

                item.innerHTML = `
                    ${timeHtml}
                    <div class="timeline-title">${titleStr}</div>
                `;
                timeline.appendChild(item);
            });
        }

        function scrollToSlide(idx) {
            slides[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Scrollspy - highlight timeline item based on visible slide
        function initScrollSpy() {
            const observerOptions = {
                root: null,
                rootMargin: '-20% 0px -60% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const slideId = entry.target.id;
                        const slideIndex = Array.from(slides).findIndex(slide => slide.id === slideId);

                        if (slideIndex !== -1) {
                            updateActiveTimelineItem(slideIndex);
                        }
                    }
                });
            }, observerOptions);

            slides.forEach(slide => {
                observer.observe(slide);
            });
        }

        function updateActiveTimelineItem(slideIndex) {
            const timelineItems = document.querySelectorAll('.timeline-item');

            timelineItems.forEach((item, idx) => {
                item.classList.remove('active');
                // Timeline items start from index 1 (skip cover slide at index 0)
                if (idx === slideIndex - 1) {
                    item.classList.add('active');
                }
            });
        }


        // Export JSON logic
        function exportToJson() {
            const exportedData = [];
            slides.forEach((slide, idx) => {
                const type = slide.getAttribute('data-type');
                const titleNode = slide.querySelector('h1, h2');
                const descNode = slide.querySelector('.desc-text');
                const originalData = presentationData[idx] || {};

                let slideData = {
                    id: idx,
                    type: type,
                    title: titleNode ? titleNode.innerHTML.trim() : "",
                    desc: descNode ? descNode.innerHTML.trim() : ""
                };

                if (originalData.subSections) {
                    slideData.subSections = originalData.subSections;
                }

                if (originalData.isSubSection) {
                    slideData.isSubSection = originalData.isSubSection;
                }

                if (originalData.gallery) {
                    slideData.gallery = originalData.gallery;
                }

                // Add time and amount for non-cover slides
                if (type !== 'cover') {
                    const timeNode = slide.querySelector('.time-text');
                    if (timeNode) slideData.time = timeNode.innerText.trim();
                    else slideData.time = slide.getAttribute('data-time'); // fallback for summary if needed

                    const amountNode = slide.querySelector('.slide-amount');
                    if (amountNode) slideData.amount = amountNode.innerText.trim();
                }

                exportedData.push(slideData);
            });

            // Convert back to JSON and trigger download
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportedData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "data.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            showToast("已下載最新 data.json，請將其上傳至 GitHub。");
        }

        // Utils
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Modal Logic
        let currentGallery = [];
        let currentModalIndex = 0;
        let isModalOpen = false;

        function openModal(index, gallery) {
            currentGallery = gallery;
            currentModalIndex = index;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = currentGallery[currentModalIndex];
            modal.style.display = 'flex';
            // Trigger reflow for animation
            void modal.offsetWidth;
            modal.classList.add('show');
            isModalOpen = true;
        }

        function navigateModal(direction) {
            if (!isModalOpen || currentGallery.length === 0) return;
            currentModalIndex += direction;

            if (currentModalIndex < 0) {
                currentModalIndex = currentGallery.length - 1;
            } else if (currentModalIndex >= currentGallery.length) {
                currentModalIndex = 0;
            }

            document.getElementById('modalImage').src = currentGallery[currentModalIndex];
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('show');
            isModalOpen = false;
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // match CSS transition duration
        }

        // Event Listeners
        document.getElementById('btn-export-json').addEventListener('click', exportToJson);

        // Close modal when clicking outside image
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById('imageModal');
            if (modal) {
                modal.addEventListener('click', function (e) {
                    if (e.target === this) {
                        closeModal();
                    }
                });
            }
        });

        // Keyboard navigation for modal
        document.addEventListener('keydown', function (e) {
            if (!isModalOpen) return;
            if (e.key === 'ArrowRight') {
                navigateModal(1);
            } else if (e.key === 'ArrowLeft') {
                navigateModal(-1);
            } else if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Export PDF
        document.getElementById('btn-pdf').addEventListener('click', () => {
            window.print();
        });

        // Export PPTX
        document.getElementById('btn-pptx').addEventListener('click', async () => {
            showToast("準備建立投影片，請稍候...");

            if (typeof PptxGenJS === 'undefined') {
                showToast("發生錯誤：尚未載入 PPTX 庫");
                return;
            }

            let pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE'; // 16:9

            pptx.defineSlideMaster({
                title: 'MASTER_SLIDE',
                background: { color: 'FDFBF7' },
            });

            slides.forEach((slide, idx) => {
                let pptSlide = pptx.addSlide({ masterName: 'MASTER_SLIDE' });

                if (slide.classList.contains('cover-slide')) {
                    pptSlide.background = { color: '3E2723' };
                    const titleNode = slide.querySelector('h1, h2');
                    let title = titleNode ? titleNode.innerText : presentationData[idx]?.title || "";
                    let descNode = slide.querySelector('.desc-text');
                    let desc = descNode ? descNode.innerText : "";

                    pptSlide.addText(title, { x: 1, y: 1.5, w: '80%', color: 'FFFFFF', fontFace: 'Microsoft JhengHei', fontSize: 48, bold: true, align: 'center', breakLine: true });
                    pptSlide.addText(desc, { x: 1, y: 4.5, w: '80%', color: 'D7CCC8', fontFace: 'Microsoft JhengHei', fontSize: 24, align: 'center' });
                } else {
                    const titleNode = slide.querySelector('h1, h2');
                    let title = titleNode ? titleNode.innerText : presentationData[idx]?.title || "";
                    pptSlide.addText(title, { x: 0.8, y: 0.8, w: '85%', color: '3E2723', fontFace: 'Microsoft JhengHei', fontSize: 36, bold: true, border: { type: 'bottom', pt: 2, color: '5D4037' } });

                    let metaEl = slide.querySelector('.slide-meta');
                    if (metaEl) {
                        let timeNode = slide.querySelector('.time-text');
                        let amountNode = slide.querySelector('.slide-amount');

                        let timeStr = timeNode ? timeNode.innerText.trim() : '';
                        let amountStr = amountNode ? amountNode.innerText.trim() : '';

                        if (timeStr) {
                            pptSlide.addText(`時程: ${timeStr}      預算: ${amountStr}`, { x: 0.8, y: 2.0, w: '80%', color: '8D6E63', fontFace: 'Microsoft JhengHei', fontSize: 18, bold: true });
                        } else {
                            pptSlide.addText(`預算: ${amountStr}`, { x: 0.8, y: 2.0, w: '80%', color: '8D6E63', fontFace: 'Microsoft JhengHei', fontSize: 22, bold: true });
                        }
                    }

                    let descNode = slide.querySelector('.desc-text');
                    let desc = descNode ? descNode.innerText : "";
                    pptSlide.addText(desc, { x: 0.8, y: 3, w: '85%', color: '555555', fontFace: 'Microsoft JhengHei', fontSize: 22, breakLine: true });
                }
            });

            try {
                await pptx.writeFile({ fileName: 'Coffee_Shop_Proposal.pptx' });
                showToast("簡報下載成功！");
            } catch (e) {
                showToast("下載失敗...");
                console.error(e);
            }
        });

        // App Init entry point
        loadData();
    </script>
</body>

</html>
